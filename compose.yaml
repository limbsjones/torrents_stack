# ArrStack - Stack media automatisée
# Proxmox CT101 (Docker) ← Samba ← CT103 (Jellyfin)
services:
  sonarr:
    image: linuxserver/sonarr
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /opt/arrstack/sonarr/config:/config
      - /mnt/media/TV/:/tv
      - /mnt/media/torrents:/downloads
    ports:
      - 8989:8989
    healthcheck:
      test: ["CMD", "curl", "-sS", "http://localhost:8989"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      deluge:
        condition: service_started
    mem_limit: 512m
    networks:
      - arrnet
    restart: unless-stopped

  radarr:
    image: linuxserver/radarr
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /opt/arrstack/radarr/config:/config
      - /mnt/media/Movies:/Movies
      - /mnt/media/torrents:/downloads
    ports:
      - 7878:7878
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      deluge:
        condition: service_started
    mem_limit: 512m
    networks:
      - arrnet
    restart: unless-stopped

  lidarr:
    image: linuxserver/lidarr
    container_name: lidarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /opt/arrstack/lidarr/config:/config
      - /mnt/media/Music:/music
      - /mnt/media/torrents:/downloads
    ports:
      - 8686:8686
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8686"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      deluge:
        condition: service_started
    mem_limit: 256m
    networks:
      - arrnet
    restart: unless-stopped

  deluge:
    image: linuxserver/deluge
    container_name: deluge
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - DELUGE_LOGLEVEL=error
    volumes:
      - /opt/arrstack/deluge/config:/config
      - /mnt/media/torrents:/downloads
      - /opt/arrstack/deluge/custom-init:/custom-cont-init.d
    ports:
      - 8112:8112
      - 6882:6882
      - 6881:6881/udp
    healthcheck:
      test: ["CMD", "curl", "-sS", "-o", "/dev/null", "http://localhost:8112"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 1g
    networks:
      - arrnet
    restart: unless-stopped

  bazarr:
    image: linuxserver/bazarr
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /opt/arrstack/bazarr/config:/config
      - /mnt/media/Movies:/Movies
      - /mnt/media/TV:/tv
    ports:
      - 6767:6767
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6767"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 256m
    networks:
      - arrnet
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /opt/arrstack/prowlarr/config:/config
    ports:
      - 9696:9696
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 256m
    networks:
      - arrnet
    restart: unless-stopped

  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /opt/arrstack/npm/data:/data
      - /opt/arrstack/npm/letsencrypt:/etc/letsencrypt
    ports:
      - 80:80
      - 81:81
      - 443:443
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:81"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 256m
    networks:
      - arrnet
    restart: unless-stopped

  heimdall:
    image: linuxserver/heimdall
    container_name: heimdall
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /opt/arrstack/heimdall/config:/config
    ports:
      - 8080:80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 128m
    networks:
      - arrnet
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    environment:
      - TZ=${TZ}
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_REVIVE_STOPPED=false
      - WATCHTOWER_NOTIFICATIONS_HOSTNAME=arrstack
      - DOCKER_API_VERSION=1.40
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    mem_limit: 64m
    networks:
      - arrnet
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
    ports:
      - 8191:8191
    mem_limit: 512m
    networks:
      - arrnet
    restart: unless-stopped

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    environment:
      - N8N_HOST=10.0.0.70
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_SECURE_COOKIE=false
      - N8N_PUBLIC_API_ENABLED=true
      - WEBHOOK_URL=http://10.0.0.70:5678/
      - TZ=${TZ}
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - 5678:5678
    mem_limit: 512m
    networks:
      - arrnet
    restart: unless-stopped

volumes:
  n8n_data:
    external: true

networks:
  arrnet:
    driver: bridge
    name: arrnet
